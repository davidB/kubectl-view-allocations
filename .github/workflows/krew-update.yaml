name: krew-update

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  krew-update:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'davidB' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: rajatjindal/krew-release-bot@c970b8a8f6dbc2f2285a26e3ae160903b87002c3  # v0.0.51
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
